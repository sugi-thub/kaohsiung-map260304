<meta charset="UTF-8">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #12121f;
    font-family: 'Yu Gothic', 'Noto Sans TC', sans-serif;
    color: #e0e0ff;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 24px 16px; gap: 16px;
  }
  h1 { font-size: 1.5rem; letter-spacing: 0.1em; color: #c8d8ff; }
  p.sub { font-size: 0.78rem; color: #666; }
  .main-layout {
    display: flex; gap: 20px; align-items: flex-start;
    flex-wrap: wrap; justify-content: center; width: 100%; max-width: 1100px;
  }
  #map-container {
    background: #1a1a30; border-radius: 14px; padding: 14px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5); flex-shrink: 0;
  }
  svg path {
    stroke: #888; stroke-width: 0.4; cursor: pointer; transition: filter 0.15s;
  }
  svg path:hover { filter: brightness(0.85); stroke-width: 1.2; stroke: #333; }
  svg path.selected { stroke: #4cc9f0; stroke-width: 2; }
  .panel {
    background: #1a1a30; border-radius: 14px; padding: 18px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5); width: 290px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .panel h2 { font-size: 0.9rem; color: #a0b0ff; border-bottom: 1px solid #2a2a50; padding-bottom: 8px; }
  .selected-info {
    font-size: 0.85rem; color: #aaa; min-height: 20px;
    background: #252545; border-radius: 6px; padding: 6px 10px;
  }
  .selected-info span { color: #fff; font-weight: bold; }
  .color-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .color-swatch {
    width: 100%; aspect-ratio: 1; border-radius: 4px; cursor: pointer;
    border: 2px solid transparent; transition: transform 0.1s, border-color 0.1s;
  }
  .color-swatch:hover { transform: scale(1.18); }
  .color-swatch.active { border-color: #4cc9f0; transform: scale(1.18); }
  .custom-color { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: #aaa; }
  input[type="color"] { width: 34px; height: 26px; border: none; border-radius: 4px; cursor: pointer; background: none; padding: 0; }
  input[type="text"] { flex: 1; background: #252545; border: 1px solid #3a3a60; border-radius: 6px; color: #fff; font-size: 0.8rem; padding: 4px 8px; }
  .apply-btn { padding: 4px 10px; background: #3a3a60; color: #ccc; font-size: 0.75rem; border-radius: 5px; border: none; cursor: pointer; }
  .bulk-btns { display: flex; flex-wrap: wrap; gap: 5px; }
  .bulk-btn {
    padding: 6px 10px; border-radius: 6px; border: none; cursor: pointer;
    font-size: 0.78rem; font-weight: bold; flex: 1;
    transition: opacity 0.15s, transform 0.1s;
  }
  .bulk-btn:hover { opacity: 0.8; transform: translateY(-1px); }
  .bulk-btn-all  { background: #3a2a5f; color: #c0a0f0; border: 1px solid #5040a0; }
  .bulk-btn-none { background: #3a2a2a; color: #f0a0a0; border: 1px solid #604040; }
  .district-list { display: flex; flex-direction: column; gap: 3px; max-height: 320px; overflow-y: auto; }
  .district-list::-webkit-scrollbar { width: 4px; }
  .district-list::-webkit-scrollbar-track { background: #1a1a30; }
  .district-list::-webkit-scrollbar-thumb { background: #3a3a60; border-radius: 2px; }
  .district-item {
    display: flex; align-items: center; gap: 8px; padding: 4px 8px;
    border-radius: 6px; cursor: pointer; font-size: 0.82rem;
    transition: background 0.1s; user-select: none;
  }
  .district-item:hover { background: #252545; }
  .district-item.multi-selected { background: #1e3050; }
  .district-dot { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.3); }
  .check-mark { margin-left: auto; color: #4cc9f0; font-size: 0.8rem; display: none; }
  .district-item.multi-selected .check-mark { display: block; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  button { padding: 8px 14px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.82rem; font-weight: bold; transition: opacity 0.15s, transform 0.1s; }
  button:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-reset { background: #3a3a60; color: #ccc; }
  .btn-export-svg  { background: #2a7d4f; color: #fff; flex: 1; }
  .btn-export-pptx { background: #c0392b; color: #fff; flex: 1; }
  #status { font-size: 0.75rem; color: #4caf50; min-height: 18px; text-align: center; }
</style>
</head>

<h1>🗺 高雄市 カラーマップエディタ</h1>

<div class="main-layout">
  <div id="map-container">
    <svg id="map" width="600" height="640"></svg>
  </div>
  <div class="panel">
    <h2>🔲 一括選択</h2>

      <button class="bulk-btn bulk-btn-all"  onclick="selectGroup('all')">✅ 全区 選択</button>

    <h2>🎨 色を選ぶ</h2>
    <div class="selected-info" id="selected-info">区をクリックして選択（複数可）</div>
    <div class="color-grid" id="color-grid"></div>
    <div class="custom-color">
      <input type="color" id="custom-color-input" value="#ffffff">
      <input type="text" id="custom-color-hex" value="#ffffff" maxlength="7" placeholder="#rrggbb">
      <button class="apply-btn" onclick="applyCustomColor()">適用</button>
    </div>
    <h2>📋 区一覧</h2>
    <div class="district-list" id="district-list"></div>
    <div class="btn-row">
      <button class="btn-reset" onclick="resetColors()">🔄 リセット</button>
    </div>
    <div class="btn-row">
      <button class="btn-export-svg"  onclick="exportSVG()">💾 SVG保存</button>
      <button class="btn-export-pptx" onclick="exportPPTX()">📊 PPTX保存</button>
    </div>
    <div id="status"></div>
  </div>
</div>

const COUNTY_NAME = "高雄市";
const TITLE = "高雄市";
const EXPORT_NAME = "kaohsiung";

const PALETTE = [
  "#ffffff","#f0f0f0","#d0d0d0","#a0a0a0","#606060",
  "#e63946","#f4a261","#ffb703","#80b918","#2a9d8f",
  "#4cc9f0","#457b9d","#4361ee","#6a4c93","#f72585",
  "#fb8500","#f3722c","#d62828","#43aa8b","#90be6d",
  "#ffca3a","#8ac926","#1982c4","#0077b6","#48cae4",
  "#a8dadc","#e76f51","#264653","#b5179e","#7209b7",
  "#3a0ca3","#023e8a","#e9c46a","#c77dff","#f9c74f",
];

const districts = ["\u4e09\u6c11\u5340", "\u4ec1\u6b66\u5340", "\u5167\u9580\u5340", "\u516d\u9f9c\u5340", "\u524d\u91d1\u5340", "\u524d\u93ae\u5340", "\u5927\u5bee\u5340", "\u5927\u6a39\u5340", "\u5927\u793e\u5340", "\u5c0f\u6e2f\u5340", "\u5ca1\u5c71\u5340", "\u5de6\u71df\u5340", "\u5f4c\u9640\u5340", "\u65b0\u8208\u5340", "\u65d7\u5c71\u5340", "\u65d7\u6d25\u5340", "\u6749\u6797\u5340", "\u6797\u5712\u5340", "\u6843\u6e90\u5340", "\u6893\u5b98\u5340", "\u6960\u6893\u5340", "\u6a4b\u982d\u5340", "\u6c38\u5b89\u5340", "\u6e56\u5167\u5340", "\u71d5\u5de2\u5340", "\u7530\u5bee\u5340", "\u7532\u4ed9\u5340", "\u7f8e\u6fc3\u5340", "\u82d3\u96c5\u5340", "\u8302\u6797\u5340", "\u8304\u8423\u5340", "\u8def\u7af9\u5340", "\u963f\u84ee\u5340", "\u9ce5\u677e\u5340", "\u9cf3\u5c71\u5340", "\u9e7d\u57d5\u5340", "\u9f13\u5c71\u5340"];
const colorMap = {};
districts.forEach(d => colorMap[d] = '#ffffff');

let selectedDistricts = new Set();
let selectedColor = '#ffffff';

const svg = d3.select("#map");
const W = 600, H = 640;
const projection = d3.geoMercator().fitExtent([[8,8],[W-8,H-8]], GEOJSON);
const pathGen = d3.geoPath().projection(projection);

const grid = document.getElementById('color-grid');
PALETTE.forEach(c => {
  const sw = document.createElement('div');
  sw.className = 'color-swatch';
  sw.style.background = c;
  sw.style.border = c === '#ffffff' ? '2px solid #555' : '2px solid transparent';
  sw.title = c;
  sw.onclick = () => {
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    selectedColor = c;
    document.getElementById('custom-color-input').value = c;
    document.getElementById('custom-color-hex').value = c;
    applyColorToSelected();
  };
  grid.appendChild(sw);
});
grid.firstChild.classList.add('active');

function applyCustomColor() {
  let hex = document.getElementById('custom-color-hex').value.trim();
  if (!hex.startsWith('#')) hex = '#' + hex;
  if (/^#[0-9a-fA-F]{6}$/.test(hex)) { selectedColor = hex; document.getElementById('custom-color-input').value = hex; applyColorToSelected(); }
}
document.getElementById('custom-color-input').oninput = function() {
  selectedColor = this.value; document.getElementById('custom-color-hex').value = this.value; applyColorToSelected();
};
document.getElementById('custom-color-hex').oninput = function() {
  let hex = this.value.trim();
  if (!hex.startsWith('#')) hex = '#' + hex;
  if (/^#[0-9a-fA-F]{6}$/.test(hex)) { selectedColor = hex; document.getElementById('custom-color-input').value = hex; applyColorToSelected(); }
};

function applyColorToSelected() {
  if (selectedDistricts.size === 0) return;
  selectedDistricts.forEach(d => { colorMap[d] = selectedColor; });
  svg.selectAll('path').attr('fill', d => colorMap[d.properties.TOWNNAME]);
  updateDistrictList(); updateSelectedInfo();
}

function selectGroup(group) {
  if (group === 'none') selectedDistricts.clear();
  else if (group === 'all') districts.forEach(d => selectedDistricts.add(d));
  updateMapSelection(); updateDistrictList(); updateSelectedInfo();
}
function updateMapSelection() {
  svg.selectAll('path').classed('selected', d => selectedDistricts.has(d.properties.TOWNNAME));
}
function updateSelectedInfo() {
  const info = document.getElementById('selected-info');
  if (selectedDistricts.size === 0) info.innerHTML = '区をクリックして選択（複数可）';
  else if (selectedDistricts.size === 1) info.innerHTML = `選択中: <span>${[...selectedDistricts][0]}</span>`;
  else info.innerHTML = `選択中: <span>${selectedDistricts.size}区</span>`;
}

svg.selectAll('path')
  .data(GEOJSON.features).join('path')
  .attr('d', pathGen)
  .attr('fill', d => colorMap[d.properties.TOWNNAME])
  .on('click', (event, d) => {
    const name = d.properties.TOWNNAME;
    if (event.shiftKey || event.ctrlKey || event.metaKey) {
      if (selectedDistricts.has(name)) selectedDistricts.delete(name); else selectedDistricts.add(name);
    } else { selectedDistricts.clear(); selectedDistricts.add(name); }
    updateMapSelection(); updateDistrictList(); updateSelectedInfo();
  });

svg.selectAll('text')
  .data(GEOJSON.features).join('text')
  .attr('transform', d => `translate(${pathGen.centroid(d)})`)
  .attr('text-anchor', 'middle').attr('dy', '0.35em')
  .style('font-size', '7px').style('fill', '#333')
  .style('pointer-events', 'none').style('font-weight', 'bold')
  .text(d => d.properties.TOWNNAME);

function updateDistrictList() {
  const list = document.getElementById('district-list');
  list.innerHTML = '';
  districts.forEach(name => {
    const isSelected = selectedDistricts.has(name);
    const item = document.createElement('div');
    item.className = 'district-item' + (isSelected ? ' multi-selected' : '');
    const borderColor = colorMap[name] === '#ffffff' ? '#888' : 'rgba(0,0,0,0.2)';
    item.innerHTML = `<div class="district-dot" style="background:${colorMap[name]};border-color:${borderColor}"></div><span>${name}</span><span class="check-mark">✓</span>`;
    item.onclick = (e) => {
      if (e.shiftKey || e.ctrlKey || e.metaKey) {
        if (selectedDistricts.has(name)) selectedDistricts.delete(name); else selectedDistricts.add(name);
      } else { selectedDistricts.clear(); selectedDistricts.add(name); }
      updateMapSelection(); updateDistrictList(); updateSelectedInfo();
    };
    list.appendChild(item);
  });
}
updateDistrictList();

function resetColors() {
  districts.forEach(d => colorMap[d] = '#ffffff');
  selectedDistricts.clear();
  svg.selectAll('path').attr('fill', '#ffffff').classed('selected', false);
  updateDistrictList(); updateSelectedInfo();
  setStatus('リセットしました');
}
function setStatus(msg, color='#4caf50') {
  const s = document.getElementById('status');
  s.style.color = color; s.textContent = msg;
  setTimeout(() => s.textContent = '', 3000);
}

function exportSVG() {
  const svgEl = document.getElementById('map');
  const clone = svgEl.cloneNode(true);
  clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  clone.querySelectorAll('path').forEach(p => { p.classList.remove('selected'); p.style.stroke = '#888'; p.style.strokeWidth = '0.4px'; });
  const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  bg.setAttribute('width', W); bg.setAttribute('height', H); bg.setAttribute('fill', '#ffffff');
  clone.insertBefore(bg, clone.firstChild);
  const blob = new Blob([clone.outerHTML], {type: 'image/svg+xml'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = EXPORT_NAME + '_map.svg'; a.click();
  setStatus('SVGを保存しました！');
}

async function exportPPTX() {
  setStatus('PPTXを生成中...', '#ffb703');
  const svgEl = document.getElementById('map');
  const clone = svgEl.cloneNode(true);
  clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  clone.setAttribute('width', W); clone.setAttribute('height', H);
  clone.querySelectorAll('path').forEach(p => { p.classList.remove('selected'); p.style.stroke = '#888'; p.style.strokeWidth = '0.5px'; });
  const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  bg.setAttribute('width', W); bg.setAttribute('height', H); bg.setAttribute('fill', '#ffffff');
  clone.insertBefore(bg, clone.firstChild);
  const img = new Image();
  const url = URL.createObjectURL(new Blob([clone.outerHTML], {type:'image/svg+xml;charset=utf-8'}));
  img.onload = async () => {
    const canvas = document.createElement('canvas');
    canvas.width = W * 2; canvas.height = H * 2;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.scale(2, 2); ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);
    const pngBase64 = canvas.toDataURL('image/png').split(',')[1];
    if (!window.PptxGenJS) {
      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pptxgenjs/3.12.0/pptxgen.bundle.js';
      document.head.appendChild(script);
      await new Promise(r => { script.onload = r; });
    }
    const pptx = new PptxGenJS();
    pptx.layout = 'LAYOUT_16x9';
    const slide = pptx.addSlide();
    slide.background = { color: 'ffffff' };
    slide.addText(TITLE + ' 行政区地図', {
      x: 0.3, y: 0.12, w: 9.4, h: 0.5, fontSize: 20, bold: true,
      color: '1a1a3f', fontFace: 'Yu Gothic', align: 'center'
    });
    const mapH = 5.0, mapW = mapH * (W / H);
    slide.addImage({ data: 'image/png;base64,' + pngBase64, x: 0.2, y: 0.7, w: mapW, h: mapH });
    // 凡例
    const legX = mapW + 0.5, legY = 0.7;
    let curY = legY;
    const cols = 2;
    districts.forEach((d, i) => {
      const col = i % cols, row = Math.floor(i / cols);
      const bx = legX + col * 1.6;
      const by = curY + row * 0.22;
      const hexColor = colorMap[d].replace('#', '');
      const borderCol = colorMap[d] === '#ffffff' ? '999999' : hexColor;
      slide.addShape(pptx.shapes.RECTANGLE, { x: bx, y: by + 0.04, w: 0.13, h: 0.13, fill: { color: hexColor }, line: { color: borderCol, width: 1 } });
      slide.addText(d, { x: bx + 0.17, y: by, w: 1.35, h: 0.21, fontSize: 7, color: '333333', fontFace: 'Yu Gothic', margin: 0 });
    });
    await pptx.writeFile({ fileName: EXPORT_NAME + '_map.pptx' });
    setStatus('PPTXを保存しました！');
  };
  img.src = url;
}
